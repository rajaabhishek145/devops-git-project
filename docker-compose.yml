services:
  web:
    build: .
    container_name: devops-compose-app
    ports:
      - "8083:80"

  db:
    image: mysql:8.0
    container_name: devops-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: devopsdb
      MYSQL_USER: devopsuser
      MYSQL_PASSWORD: devops123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: devops-phpmyadmin
    restart: always
    ports:
      - "8084:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root123
    depends_on:
      - db

volumes:
  mysql_data: